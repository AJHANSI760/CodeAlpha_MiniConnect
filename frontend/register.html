<!DOCTYPE html>
<html>
<head>
    <title>Register - MiniConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>🚀 MiniConnect!!</h1>

        <p class="subtitle">
            Join us! Create your account.
        </p>

        <input
            type="text"
            id="username"
            placeholder="Enter Username"
        >

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
        >

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
        >

<button onclick="registerUser()">
Register
</button>

</div>

<script src="script.js"></script>

</body>
</html>
