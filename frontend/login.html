<!DOCTYPE html>
<html>
<head>
    <title>Login - MiniConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>🚀 MiniConnect</h1>

            <p class="subtitle">
                Welcome back! Login to continue.
            </p>

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
            >

            <input
                type="password"
                id="password"
            placeholder="Enter Password"
            >

            <button onclick="login()">
                Login
            </button>

            <p class="bottom-text">
                New user?
                <a href="register.html">
                    Create Account
                </a>
            </p>

        </div>

    </div>

    <script src="login.js"></script>

</body>
</html>
